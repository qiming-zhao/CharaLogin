<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页</title>
    <link rel="stylesheet" href="./style.css">

    <link rel="stylesheet" href="./tailwind_output.css">
</head>

<body class="antialiased text-foreground bg-background overflow-hidden">

    <div class="min-h-screen grid lg:grid-cols-2">
        <div
            class="relative hidden lg:flex flex-col justify-between bg-gradient-to-br from-primary/90 via-primary to-primary/80 p-12 text-primary-foreground overflow-hidden">
            <div class="relative z-20">
                <div class="flex items-center gap-2 text-lg font-semibold">
                    <div
                        class="size-8 rounded-lg bg-primary-foreground/10 backdrop-blur-sm flex items-center justify-center">
                        <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
                            <path d="M20 3v4" />
                            <path d="M22 5h-4" />
                            <path d="M4 17v2" />
                            <path d="M5 18H3" />
                        </svg>
                    </div>
                    <span>YourBrand</span>
                </div>
            </div>

            <div class="relative z-20 flex items-end justify-center h-[500px]">
                <div class="relative" style="width: 550px; height: 400px;">


                    <div class="entrance-anim delay-2 absolute bottom-0" style="left: 70px; z-index: 1;">
                        <div id="char-purple" class="char-transition"
                            style="width: 180px; height: 400px; background-color: #6C3FF5; border-radius: 10px 10px 0 0; transform-origin: bottom center;">
                            <div id="eyes-purple" class="absolute flex gap-8 char-transition">
                                <div class="eye-wrapper rounded-full flex items-center justify-center eye-transition bg-white overflow-hidden"
                                    style="width: 18px; height: 18px;" data-max-dist="5">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 7px; height: 7px;"></div>
                                </div>
                                <div class="eye-wrapper rounded-full flex items-center justify-center eye-transition bg-white overflow-hidden"
                                    style="width: 18px; height: 18px;" data-max-dist="5">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 7px; height: 7px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>


                    <div class="entrance-anim delay-4 absolute bottom-0" style="left: 240px; z-index: 2;">
                        <div id="char-black" class="char-transition"
                            style="width: 120px; height: 310px; background-color: #2D2D2D; border-radius: 8px 8px 0 0; transform-origin: bottom center;">
                            <div id="eyes-black" class="absolute flex gap-6 char-transition">
                                <div class="eye-wrapper rounded-full flex items-center justify-center eye-transition bg-white overflow-hidden"
                                    style="width: 16px; height: 16px;" data-max-dist="4">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 6px; height: 6px;"></div>
                                </div>
                                <div class="eye-wrapper rounded-full flex items-center justify-center eye-transition bg-white overflow-hidden"
                                    style="width: 16px; height: 16px;" data-max-dist="4">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 6px; height: 6px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>


                    <div class="entrance-anim delay-1 absolute bottom-0" style="left: 0px; z-index: 3;">
                        <div id="char-orange" class="char-transition"
                            style="width: 240px; height: 200px; background-color: #FF9B6B; border-radius: 120px 120px 0 0; transform-origin: bottom center;">
                            <div id="eyes-orange" class="absolute flex gap-8 char-transition"
                                style="transition-duration: 0.2s; transition-timing-function: ease-out;">
                                <div class="eye-wrapper" data-max-dist="5">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 12px; height: 12px;"></div>
                                </div>
                                <div class="eye-wrapper" data-max-dist="5">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 12px; height: 12px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>


                    <div class="entrance-anim delay-3 absolute bottom-0" style="left: 310px; z-index: 4;">
                        <div id="char-yellow" class="char-transition"
                            style="width: 140px; height: 230px; background-color: #E8D754; border-radius: 70px 70px 0 0; transform-origin: bottom center;">
                            <div id="eyes-yellow" class="absolute flex gap-6 char-transition"
                                style="transition-duration: 0.2s; transition-timing-function: ease-out;">
                                <div class="eye-wrapper" data-max-dist="5">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 12px; height: 12px;"></div>
                                </div>
                                <div class="eye-wrapper" data-max-dist="5">
                                    <div class="pupil rounded-full eye-transition bg-[#2D2D2D]"
                                        style="width: 12px; height: 12px;"></div>
                                </div>
                            </div>
                            <div id="mouth-yellow"
                                class="absolute w-20 h-[4px] bg-[#2D2D2D] rounded-full char-transition"
                                style="transition-duration: 0.2s; transition-timing-function: ease-out;"></div>
                        </div>
                    </div>

                </div>

            </div>


            <div class="relative z-20"></div>

            <div class="absolute inset-0 bg-grid-white bg-[size:20px_20px]"></div>
            <div class="absolute top-1/4 right-1/4 size-64 bg-primary-foreground/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/4 left-1/4 size-96 bg-primary-foreground/5 rounded-full blur-3xl"></div>
        </div>

        <div class="flex items-center justify-center p-8 bg-background">
            <div class="w-full max-w-[420px]">
                <div class="lg:hidden flex items-center justify-center gap-2 text-lg font-semibold mb-12">
                    <div class="size-8 rounded-lg bg-primary/10 flex items-center justify-center">
                        <svg class="size-4 text-primary" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
                            <path d="M20 3v4" />
                            <path d="M22 5h-4" />
                            <path d="M4 17v2" />
                            <path d="M5 18H3" />
                        </svg>
                    </div>
                    <span>YourBrand</span>
                </div>

                <div class="text-center mb-10">
                    <h1 class="text-3xl font-bold tracking-tight mb-2">Welcome back!</h1>
                    <p class="text-muted-foreground text-sm">Please enter your details</p>
                </div>

                <form id="login-form" class="space-y-5">
                    <div class="space-y-2">
                        <label for="email" class="text-sm font-medium leading-none">Email</label>
                        <input id="email" type="email" placeholder="anna@gmail.com" autocomplete="off" required
                            class="flex w-full rounded-md border border-border/60 bg-background px-3 py-2 text-sm h-12 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
                    </div>

                    <div class="space-y-2">
                        <label for="password" class="text-sm font-medium leading-none">Password</label>
                        <div class="relative">
                            <input id="password" type="password" placeholder="••••••••" required
                                class="flex w-full rounded-md border border-border/60 bg-background px-3 py-2 text-sm h-12 pr-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
                            <button type="button" id="toggle-password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors">
                                <svg id="icon-eye" class="size-5 hidden" xmlns="http://www.w3.org/2000/svg" width="24"
                                    height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                                <svg id="icon-eye-off" class="size-5" xmlns="http://www.w3.org/2000/svg" width="24"
                                    height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                    <path
                                        d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                    <line x1="2" x2="22" y1="2" y2="22" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <input type="checkbox" id="remember" class="custom-checkbox">
                            <label for="remember" class="text-sm font-normal cursor-pointer leading-none">
                                Remember for 30 days
                            </label>
                        </div>
                        <a href="#" class="text-sm text-primary hover:underline font-medium">Forgot password?</a>
                    </div>

                    <div id="error-message"
                        class="hidden p-3 text-sm text-red-400 bg-red-950/20 border border-red-900/30 rounded-lg"></div>

                    <button type="submit" id="submit-btn"
                        class="inline-flex items-center justify-center rounded-md text-base font-medium transition-colors bg-primary text-primary-foreground hover:bg-primary/90 w-full h-12 disabled:opacity-50">
                        Log in
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
